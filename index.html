<!DOCTYPE html>
<html lang="he" dir="rtl" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>בונים משכן לקהילת חמד"ת השקד | קמפיין גיוס המונים</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <!-- Google Fonts: Heebo -->
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Heebo', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            sky: '#e0f2fe',
                            blue: '#0369a1',
                            darkBlue: '#0c4a6e',
                            gold: '#d97706',
                            pink: '#fda4af',
                            lightPink: '#fce7f3'
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body {
            font-family: 'Heebo', sans-serif;
            background: linear-gradient(135deg, #f0f9ff 0%, #e0f2fe 100%);
            color: #0c4a6e;
            height: 100vh;
            overflow: hidden;
            margin: 0;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        .countdown-box {
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(8px);
            border: 2px solid rgba(217, 119, 6, 0.3);
        }
    </style>
</head>
<body class="selection:bg-amber-500 selection:text-white p-3 sm:p-4">

    <!-- Fireworks Canvas Overlay -->
    <canvas id="fireworksCanvas" class="fixed inset-0 pointer-events-none z-50 w-full h-full hidden"></canvas>

    <main class="max-w-3xl mx-auto w-full flex flex-col justify-center gap-3 my-auto">

        <section class="w-full bg-white/90 backdrop-blur-md rounded-2xl shadow-lg overflow-hidden border border-sky-200">
            <div class="relative w-full overflow-hidden bg-sky-100 flex items-center justify-center">
                <!-- Banner Image updated to pic.png -->
                <img src="pic.png" 
                     onerror="this.src='https://placehold.co/1200x450/e0f2fe/0369a1?text=בונים+משכן+לקהילת+חמדתי+השקד'"
                     alt="בונים משכן לקהילת חמד״ת השקד" 
                     class="w-full h-auto object-cover max-h-[220px] sm:max-h-[250px]">
                <div class="absolute inset-0 bg-gradient-to-t from-sky-950/40 via-transparent to-transparent flex items-end p-4">
                    <div class="text-white">
                        <span class="bg-amber-500/90 text-white text-[11px] font-bold px-2.5 py-0.5 rounded-full mb-1 inline-block shadow">קמפיין גיוס המונים</span>
                        <h2 class="text-xl sm:text-2xl font-black tracking-tight drop-shadow">בונים משכן לקהילת חמד״ת השקד</h2>
                    </div>
                </div>
            </div>
        </section>

        <section class="w-full bg-white/95 backdrop-blur-md rounded-2xl shadow-lg p-4 sm:p-5 border border-sky-200" id="donate">
            
            <div class="flex items-center justify-between gap-4 mb-3">
                <!-- Goal -->
                <div class="flex items-center gap-2 text-sky-800 font-medium text-xs sm:text-sm">
                    <i class="fa-solid fa-chart-line text-amber-600"></i>
                    <span>יעד: <strong class="text-slate-900 font-bold font-mono cursor-pointer hover:text-amber-600 transition-colors" onclick="triggerFireworks()" title="לחץ להפעלת זיקוקי חגיגה">₪700,000</strong></span>
                </div>

                <!-- Raised So Far -->
                <div class="flex items-center gap-2">
                    <span class="text-xl sm:text-2xl font-black text-brand-darkBlue font-mono" id="raisedAmount">₪457,292</span>
                    <span class="text-xs text-slate-500 font-medium">הושג</span>
                    <i class="fa-solid fa-coins text-amber-500 text-base"></i>
                </div>
            </div>

            <!-- Progress Bar Track -->
            <div class="relative w-full h-6 bg-sky-100 rounded-full overflow-hidden p-1 shadow-inner mb-4">
                <!-- Filled Bar (65%) -->
                <div id="progressBar" class="h-full bg-gradient-to-r from-sky-600 to-amber-500 rounded-full transition-all duration-1000 relative" style="width: 65%;">
                    <div class="absolute left-0 top-0 bottom-0 w-2 bg-amber-300 rounded-full animate-pulse"></div>
                </div>

                <!-- Floating Percentage Badge -->
                <div class="absolute top-1/2 -translate-y-1/2 left-[65%] -translate-x-1/2 z-10">
                    <div class="w-9 h-9 rounded-full bg-brand-darkBlue text-white text-[10px] font-bold flex items-center justify-center border-2 border-white shadow font-mono" id="percentBadge">
                        65%
                    </div>
                </div>
            </div>

            <!-- Bottom info & Donors count -->
            <div class="flex items-center justify-between gap-4 pt-2 border-t border-sky-100">
                <div class="flex items-center gap-2 text-sky-800 font-medium text-xs">
                    <i class="fa-solid fa-users text-amber-600"></i>
                    <span id="donorsCount">848 תורמים</span>
                </div>

                <div class="flex items-center gap-3">
                    <a href="https://www.peach-in.com/cmp/aTGwsdcbs" target="_blank" class="bg-gradient-to-r from-amber-600 to-amber-500 hover:from-amber-500 hover:to-amber-400 text-white px-6 py-2.5 rounded-xl font-bold text-xs sm:text-sm shadow-md shadow-amber-600/30 transition-all flex items-center justify-center gap-2">
                        <i class="fa-solid fa-hand-holding-dollar text-amber-100"></i>
                        <span>תרום עכשיו</span>
                    </a>
                </div>
            </div>

        </section>

        <section class="w-full bg-gradient-to-r from-sky-900 to-brand-darkBlue rounded-2xl shadow-lg p-4 sm:p-5 text-white text-center relative overflow-hidden border border-sky-700/50">
            <div class="absolute inset-0 opacity-10 bg-[radial-gradient(#ffffff_1px,transparent_1px)] [background-size:12px_12px]"></div>

            <div class="relative z-10">
                <h3 class="text-base sm:text-lg font-bold mb-3 tracking-wide text-amber-300">הקמפיין יסתיים בעוד</h3>

                <!-- Countdown Units Grid (LTR so days are on the left) -->
                <div class="grid grid-cols-4 gap-2 max-w-lg mx-auto" dir="ltr">
                    <!-- Days -->
                    <div class="countdown-box rounded-xl p-2.5 flex flex-col items-center justify-center shadow text-slate-900">
                        <span class="text-xl sm:text-2xl font-black font-mono tracking-wider" id="daysValue">0</span>
                        <span class="text-[10px] text-amber-700 font-bold">ימים</span>
                    </div>

                    <!-- Hours -->
                    <div class="countdown-box rounded-xl p-2.5 flex flex-col items-center justify-center shadow text-slate-900">
                        <span class="text-xl sm:text-2xl font-black font-mono tracking-wider" id="hoursValue">00</span>
                        <span class="text-[10px] text-amber-700 font-bold">שעות</span>
                    </div>

                    <!-- Minutes -->
                    <div class="countdown-box rounded-xl p-2.5 flex flex-col items-center justify-center shadow text-slate-900">
                        <span class="text-xl sm:text-2xl font-black font-mono tracking-wider" id="minsValue">00</span>
                        <span class="text-[10px] text-amber-700 font-bold">דקות</span>
                    </div>

                    <!-- Seconds -->
                    <div class="countdown-box rounded-xl p-2.5 flex flex-col items-center justify-center shadow text-slate-900">
                        <span class="text-xl sm:text-2xl font-black font-mono tracking-wider text-amber-600" id="secsValue">00</span>
                        <span class="text-[10px] text-amber-700 font-bold">שניות</span>
                    </div>
                </div>
            </div>
        </section>

    </main>

    <footer class="w-full text-center text-[11px] text-sky-800/80 font-medium">
        <p>קהילת חמד״ת השקד © כל הזכויות שמורות</p>
    </footer>

    <script>
        // Target End Date: Sunday, July 26, 2026 at 10:00:00 AM
        const targetDate = new Date('2026-07-26T10:00:00').getTime();

        function updateCountdown() {
            const now = new Date().getTime();
            const distance = targetDate - now;

            if (distance < 0) {
                document.getElementById('daysValue').textContent = '0';
                document.getElementById('hoursValue').textContent = '00';
                document.getElementById('minsValue').textContent = '00';
                document.getElementById('secsValue').textContent = '00';
                return;
            }

            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((distance % (1000 * 60)) / 1000);

            document.getElementById('daysValue').textContent = days;
            document.getElementById('hoursValue').textContent = String(hours).padStart(2, '0');
            document.getElementById('minsValue').textContent = String(minutes).padStart(2, '0');
            document.getElementById('secsValue').textContent = String(seconds).padStart(2, '0');
        }

        updateCountdown();
        setInterval(updateCountdown, 1000);

        // Fireworks & Goal Check Logic
        const goalAmount = 700000;
        let currentRaised = 457292; // Set to 700000+ to trigger automatically when goal reached

        // Function to trigger fireworks effect
        function triggerFireworks() {
            const canvas = document.getElementById('fireworksCanvas');
            canvas.classList.remove('hidden');
            const ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;

            let particles = [];
            
            class FireworkParticle {
                constructor(x, y, color) {
                    this.x = x;
                    this.y = y;
                    this.color = color;
                    const angle = Math.random() * Math.PI * 2;
                    const speed = Math.random() * 6 + 2;
                    this.vx = Math.cos(angle) * speed;
                    this.vy = Math.sin(angle) * speed;
                    this.alpha = 1;
                    this.decay = Math.random() * 0.015 + 0.010;
                }
                update() {
                    this.x += this.vx;
                    this.y += this.vy;
                    this.vy += 0.1; // gravity
                    this.alpha -= this.decay;
                }
                draw(ctx) {
                    ctx.save();
                    ctx.globalAlpha = this.alpha;
                    ctx.fillStyle = this.color;
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, 3.5, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.restore();
                }
            }

            function createFirework() {
                const x = Math.random() * canvas.width;
                const y = Math.random() * (canvas.height * 0.6);
                const colors = ['#f59e0b', '#ef4444', '#3b82f6', '#10b981', '#ec4899', '#8b5cf6'];
                const color = colors[Math.floor(Math.random() * colors.length)];
                for (let i = 0; i < 60; i++) {
                    particles.push(new FireworkParticle(x, y, color));
                }
            }

            // Launch multiple fireworks bursts
            for (let i = 0; i < 6; i++) {
                setTimeout(createFirework, i * 350);
            }

            function loop() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                particles.forEach((p, index) => {
                    p.update();
                    p.draw(ctx);
                    if (p.alpha <= 0) {
                        particles.splice(index, 1);
                    }
                });
                if (particles.length > 0) {
                    requestAnimationFrame(loop);
                } else {
                    canvas.classList.add('hidden');
                }
            }
            loop();
        }

        // Auto trigger if goal reached
        if (currentRaised >= goalAmount) {
            triggerFireworks();
        }
    </script>
</body>
</html>
