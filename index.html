<artifact type="html" title="campaign.html" path="campaign.html">
<!DOCTYPE html>
<html lang="he" dir="rtl" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>בונים משכן לקהילת חמד"ת השקד | קמפיין גיוס המונים</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Heebo', 'sans-serif'] },
                    colors: {
                        brand: {
                            sky: '#e0f2fe',
                            blue: '#0369a1',
                            darkBlue: '#0c4a6e',
                            gold: '#d97706',
                            pink: '#fda4af',
                            lightPink: '#fce7f3'
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body {
            font-family: 'Heebo', sans-serif;
            background: linear-gradient(135deg, #f0f9ff 0%, #e0f2fe 100%);
            color: #0c4a6e;
            height: 100vh;
            overflow: hidden;
            margin: 0;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        .countdown-box {
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(8px);
            border: 2px solid rgba(217, 119, 6, 0.3);
        }
    </style>
</head>
<body class="selection:bg-amber-500 selection:text-white p-3 sm:p-4">

    <canvas id="fireworksCanvas" class="fixed inset-0 pointer-events-none z-50 w-full h-full hidden"></canvas>

    <div id="toast" class="fixed top-6 left-1/2 -translate-x-1/2 z-50 transform -translate-y-20 opacity-0 transition-all duration-300 bg-brand-darkBlue text-white px-4 py-2.5 rounded-xl shadow-2xl flex items-center gap-2.5 border border-amber-500/40 text-xs sm:text-sm">
        <i class="fa-solid fa-circle-check text-amber-400"></i>
        <span id="toastMessage">תרומה חדשה התקבלה!</span>
    </div>

    <main class="max-w-3xl mx-auto w-full flex flex-col justify-center gap-3 my-auto">

        <section class="w-full bg-white/90 backdrop-blur-md rounded-2xl shadow-lg overflow-hidden border border-sky-200">
            <div class="relative w-full overflow-hidden bg-sky-100 flex items-center justify-center">
                <img src="pic.png"
                     onerror="this.src='https://placehold.co/1200x450/e0f2fe/0369a1?text=בונים+משכן+לקהילת+חמדתי+השקד'"
                     alt="בונים משכן לקהילת חמד״ת השקד"
                     class="w-full h-auto object-cover max-h-[220px] sm:max-h-[250px]">
                <div class="absolute inset-0 bg-gradient-to-t from-sky-950/40 via-transparent to-transparent flex items-end p-4">
                    <div class="text-white">
                        <span class="bg-amber-500/90 text-white text-[11px] font-bold px-2.5 py-0.5 rounded-full mb-1 inline-block shadow">קמפיין גיוס המונים</span>
                        <h2 class="text-xl sm:text-2xl font-black tracking-tight drop-shadow">בונים משכן לקהילת חמד"ת השקד</h2>
                    </div>
                </div>
            </div>
        </section>

        <section class="w-full bg-white/95 backdrop-blur-md rounded-2xl shadow-lg p-4 sm:p-5 border border-sky-200" id="donate">

            <div class="flex items-center justify-between gap-4 mb-3">
                <div class="flex items-center gap-1.5 text-sky-800 font-medium text-xs sm:text-sm">
                    <span id="goalAmountBtn" class="text-slate-900 font-bold font-mono cursor-pointer hover:text-amber-600 transition-colors underline decoration-dotted underline-offset-4" title="לחץ להפעלת זיקוקי חגיגה ענקיים">₪700,000</span>
                    <span>יעד הפרויקט:</span>
                    <i class="fa-solid fa-chart-line text-amber-600"></i>
                </div>

                <div class="flex items-center gap-2 cursor-pointer group" onclick="promptManualAmount()" title="לחץ לעריכה ידנית של הסכום">
                    <i class="fa-solid fa-coins text-amber-500 text-base group-hover:scale-110 transition-transform"></i>
                    <span class="text-xs text-slate-500 font-medium">הושג עד כה</span>
                    <span class="text-xl sm:text-2xl font-black text-brand-darkBlue font-mono transition-all group-hover:text-amber-600" id="raisedAmount">₪464,082</span>
                    <i class="fa-solid fa-pencil text-[10px] text-slate-400 opacity-0 group-hover:opacity-100 transition-opacity"></i>
                </div>
            </div>

            <div class="relative w-full h-6 bg-slate-200/80 rounded-full overflow-visible p-0.5 shadow-inner mb-4">
                <div id="progressBar" class="absolute right-0 top-0 bottom-0 bg-[#0c4a6e] rounded-full transition-all duration-1000" style="width: 65%;">
                    <div id="percentBadgeContainer" class="absolute top-1/2 -translate-y-1/2 left-0 -translate-x-1/2 z-20">
                        <div class="w-8 h-8 sm:w-9 sm:h-9 rounded-full bg-[#0c4a6e] text-white text-[10px] sm:text-xs font-bold flex items-center justify-center border-2 border-white shadow-md font-mono" id="percentBadge">
                            65%
                        </div>
                    </div>
                </div>
            </div>

            <div class="flex items-center justify-between gap-4 pt-2 border-t border-sky-100">
                <div class="flex items-center gap-2 text-sky-800 font-medium text-xs">
                    <i class="fa-solid fa-users text-amber-600"></i>
                    <span id="donorsCount">842 תורמים</span>
                </div>

                <div class="flex items-center gap-3">
                    <a href="https://www.peach-in.com/cmp/aTGwsdcbs" target="_blank" class="bg-gradient-to-r from-amber-600 to-amber-500 hover:from-amber-500 hover:to-amber-400 text-white px-6 py-2.5 rounded-xl font-bold text-xs sm:text-sm shadow-md shadow-amber-600/30 transition-all flex items-center justify-center gap-2">
                        <i class="fa-solid fa-hand-holding-dollar text-amber-100"></i>
                        <span>תרמו עכשיו</span>
                    </a>
                </div>
            </div>

        </section>

        <section class="w-full bg-gradient-to-r from-sky-900 to-brand-darkBlue rounded-2xl shadow-lg p-4 sm:p-5 text-white text-center relative overflow-hidden border border-sky-700/50">
            <div class="absolute inset-0 opacity-10 bg-[radial-gradient(#ffffff_1px,transparent_1px)] [background-size:12px_12px]"></div>

            <div class="relative z-10">
                <h3 class="text-base sm:text-lg font-bold mb-3 tracking-wide text-amber-300">הקמפיין יסתיים בעוד</h3>

                <div class="grid grid-cols-4 gap-2 max-w-lg mx-auto" dir="ltr">
                    <div class="countdown-box rounded-xl p-2.5 flex flex-col items-center justify-center shadow text-slate-900">
                        <span class="text-xl sm:text-2xl font-black font-mono tracking-wider" id="daysValue">0</span>
                        <span class="text-[10px] text-amber-700 font-bold">ימים</span>
                    </div>
                    <div class="countdown-box rounded-xl p-2.5 flex flex-col items-center justify-center shadow text-slate-900">
                        <span class="text-xl sm:text-2xl font-black font-mono tracking-wider" id="hoursValue">00</span>
                        <span class="text-[10px] text-amber-700 font-bold">שעות</span>
                    </div>
                    <div class="countdown-box rounded-xl p-2.5 flex flex-col items-center justify-center shadow text-slate-900">
                        <span class="text-xl sm:text-2xl font-black font-mono tracking-wider" id="minsValue">00</span>
                        <span class="text-[10px] text-amber-700 font-bold">דקות</span>
                    </div>
                    <div class="countdown-box rounded-xl p-2.5 flex flex-col items-center justify-center shadow text-slate-900">
                        <span class="text-xl sm:text-2xl font-black font-mono tracking-wider text-amber-600" id="secsValue">00</span>
                        <span class="text-[10px] text-amber-700 font-bold">שניות</span>
                    </div>
                </div>
            </div>
        </section>

    </main>

    <footer class="w-full text-center text-[11px] text-sky-800/80 font-medium">
        <p>קהילת חמד״ת השקד © כל הזכויות שמורות</p>
    </footer>

    <script>
        const targetDate = new Date('2026-07-26T10:00:00').getTime();

        function updateCountdown() {
            const now = new Date().getTime();
            const distance = targetDate - now;

            if (distance < 0) {
                document.getElementById('daysValue').textContent = '0';
                document.getElementById('hoursValue').textContent = '00';
                document.getElementById('minsValue').textContent = '00';
                document.getElementById('secsValue').textContent = '00';
                return;
            }

            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((distance % (1000 * 60)) / 1000);

            document.getElementById('daysValue').textContent = days;
            document.getElementById('hoursValue').textContent = String(hours).padStart(2, '0');
            document.getElementById('minsValue').textContent = String(minutes).padStart(2, '0');
            document.getElementById('secsValue').textContent = String(seconds).padStart(2, '0');
        }

        updateCountdown();
        setInterval(updateCountdown, 1000);

        const goalAmount = 700000;
        let currentRaised = 464082;
        let donorsCount = 842;
        let displayedRaised = 0;
        let displayedDonors = 0;
        let firstLoad = true;

        const savedRaised = localStorage.getItem('hamedet_raised');
        const savedDonors = localStorage.getItem('hamedet_donors');

        if (savedRaised && parseInt(savedRaised, 10) > 0) {
            currentRaised = parseInt(savedRaised, 10);
            displayedRaised = currentRaised;
        }
        if (savedDonors && parseInt(savedDonors, 10) > 0) {
            donorsCount = parseInt(savedDonors, 10);
            displayedDonors = donorsCount;
        }

        function animateNumberSlot(element, startVal, endVal, formatFn, duration = 1200) {
            if (startVal === endVal) {
                element.textContent = formatFn(endVal);
                return;
            }

            element.classList.add('inline-block', 'transition-all', 'duration-200', 'scale-110', 'text-amber-500');

            const startTime = performance.now();

            function step(currentTime) {
                const elapsed = currentTime - startTime;
                const progress = Math.min(elapsed / duration, 1);

                const easedProgress = 1 - Math.pow(1 - progress, 3);
                const currentVal = Math.floor(startVal + (endVal - startVal) * easedProgress);

                element.textContent = formatFn(currentVal);

                if (progress < 1) {
                    requestAnimationFrame(step);
                } else {
                    element.textContent = formatFn(endVal);
                    setTimeout(() => {
                        element.classList.remove('scale-110', 'text-amber-500');
                    }, 200);
                }
            }

            requestAnimationFrame(step);
        }

        function updateCampaignUI(animate = false) {
            const percent = Math.min(100, Math.round((currentRaised / goalAmount) * 100));

            if (animate && (displayedRaised !== currentRaised || displayedDonors !== donorsCount)) {
                if (displayedRaised !== currentRaised) {
                    animateNumberSlot(
                        document.getElementById('raisedAmount'),
                        displayedRaised,
                        currentRaised,
                        (val) => '₪' + val.toLocaleString()
                    );
                    displayedRaised = currentRaised;
                }
                if (displayedDonors !== donorsCount) {
                    animateNumberSlot(
                        document.getElementById('donorsCount'),
                        displayedDonors,
                        donorsCount,
                        (val) => val.toLocaleString() + ' תורמים'
                    );
                    displayedDonors = donorsCount;
                }
            } else {
                document.getElementById('raisedAmount').textContent = '₪' + currentRaised.toLocaleString();
                document.getElementById('donorsCount').textContent = donorsCount.toLocaleString() + ' תורמים';
                displayedRaised = currentRaised;
                displayedDonors = donorsCount;
            }

            const progressBar = document.getElementById('progressBar');
            progressBar.style.width = percent + '%';
            document.getElementById('percentBadge').textContent = percent + '%';
        }

        const STATS_URL = 'https://api.peach-in.com/v3/payment/campaign/stats';
        const STATS_BODY = JSON.stringify({ accountId: 'aTGw', campaignId: 'AqQq', mappingProductAmountField: null });

        async function syncWithSource() {
            try {
                const response = await fetch(STATS_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain;charset=UTF-8' },
                    body: STATS_BODY,
                    cache: 'no-store'
                });

                if (!response.ok) return;

                const data = await response.json();
                const newRaised = Math.round(Number(data.totalDonationSum) || 0);
                const newDonors = Number(data.totalDonationCount) || 0;

                if (newRaised <= 0) return;

                const diff = firstLoad ? 0 : newRaised - currentRaised;
                currentRaised = newRaised;
                if (newDonors > 0) donorsCount = newDonors;

                localStorage.setItem('hamedet_raised', currentRaised);
                localStorage.setItem('hamedet_donors', donorsCount);

                updateCampaignUI(!firstLoad);
                if (firstLoad) { firstLoad = false; }

                if (diff > 0) {
                    showToast(`תרומה חדשה התקבלה! (+₪${diff.toLocaleString()})`);
                }
                if (currentRaised >= goalAmount) {
                    triggerGrandFireworks();
                    showToast('🎉 יעד הקמפיין הושג במלואו! תודה מקרב לב!');
                }
            } catch (e) {
                console.log('Background sync skipped:', e);
            }
        }

        window.promptManualAmount = function() {
            const input = prompt('הכנס את הסכום העדכני שמופיע ב-Peach-in (למשל: 464082):', currentRaised);
            if (input !== null) {
                const cleaned = parseInt(input.replace(/[^\\d]/g, ''), 10);
                if (!isNaN(cleaned) && cleaned >= 0) {
                    currentRaised = cleaned;
                    localStorage.setItem('hamedet_raised', currentRaised);
                    updateCampaignUI(true);
                    showToast(`הסכום עודכן בהצלחה ל-₪${currentRaised.toLocaleString()}`);
                    if (currentRaised >= goalAmount) {
                        triggerGrandFireworks();
                        showToast('🎉 יעד הקמפיין הושג במלואו! תודה מקרב לב!');
                    }
                }
            }
        };

        updateCampaignUI(false);
        syncWithSource();
        setInterval(syncWithSource, 15000);

        function showToast(message) {
            const toast = document.getElementById('toast');
            const toastMessage = document.getElementById('toastMessage');
            toastMessage.textContent = message;

            toast.classList.remove('-translate-y-20', 'opacity-0');
            setTimeout(() => {
                toast.classList.add('-translate-y-20', 'opacity-0');
            }, 3500);
        }

        function triggerGrandFireworks() {
            const canvas = document.getElementById('fireworksCanvas');
            canvas.classList.remove('hidden');
            const ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;

            let particles = [];
            let rockets = [];

            class Rocket {
                constructor() {
                    this.x = Math.random() * canvas.width;
                    this.y = canvas.height;
                    this.targetY = Math.random() * (canvas.height * 0.5) + (canvas.height * 0.1);
                    this.speed = Math.random() * 4 + 9;
                    this.color = ['#f59e0b', '#ef4444', '#3b82f6', '#10b981', '#ec4899', '#8b5cf6', '#ffffff'][Math.floor(Math.random() * 7)];
                    this.angle = (Math.random() - 0.5) * 0.25;
                }
                update() {
                    this.y -= this.speed;
                    this.x += this.angle * 4;
                    this.speed *= 0.98;
                }
                draw() {
                    ctx.save();
                    ctx.fillStyle = this.color;
                    ctx.shadowColor = this.color;
                    ctx.shadowBlur = 10;
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, 3.5, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.restore();
                }
            }

            class FireworkParticle {
                constructor(x, y, color) {
                    this.x = x;
                    this.y = y;
                    this.color = color;
                    const angle = Math.random() * Math.PI * 2;
                    const speed = Math.random() * 10 + 1.5;
                    this.vx = Math.cos(angle) * speed;
                    this.vy = Math.sin(angle) * speed;
                    this.alpha = 1;
                    this.decay = Math.random() * 0.010 + 0.006;
                    this.size = Math.random() * 4 + 1.5;
                    this.gravity = 0.09;
                }
                update() {
                    this.x += this.vx;
                    this.y += this.vy;
                    this.vy += this.gravity;
                    this.vx *= 0.96;
                    this.vy *= 0.96;
                    this.alpha -= this.decay;
                }
                draw(ctx) {
                    ctx.save();
                    ctx.globalAlpha = Math.max(0, this.alpha);
                    ctx.fillStyle = this.color;
                    ctx.shadowColor = this.color;
                    ctx.shadowBlur = 15;
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.restore();
                }
            }

            function explode(x, y, color) {
                const count = 110;
                for (let i = 0; i < count; i++) {
                    particles.push(new FireworkParticle(x, y, color));
                }
                for (let i = 0; i < 45; i++) {
                    particles.push(new FireworkParticle(x, y, '#ffffff'));
                }
            }

            let rocketInterval = setInterval(() => {
                rockets.push(new Rocket());
                if (Math.random() > 0.4) rockets.push(new Rocket());
            }, 250);

            setTimeout(() => {
                clearInterval(rocketInterval);
            }, 7500);

            let startTime = Date.now();
            let duration = 10000;

            function loop() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);

                rockets.forEach((rocket, index) => {
                    rocket.update();
                    rocket.draw();
                    if (rocket.y <= rocket.targetY || rocket.speed < 1.2) {
                        explode(rocket.x, rocket.y, rocket.color);
                        rockets.splice(index, 1);
                    }
                });

                particles.forEach((p, index) => {
                    p.update();
                    p.draw(ctx);
                    if (p.alpha <= 0) {
                        particles.splice(index, 1);
                    }
                });

                if (Date.now() - startTime < duration || particles.length > 0 || rockets.length > 0) {
                    requestAnimationFrame(loop);
                } else {
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    canvas.classList.add('hidden');
                }
            }

            for (let i = 0; i < 4; i++) {
                setTimeout(() => {
                    explode(Math.random() * (canvas.width * 0.8) + canvas.width * 0.1, Math.random() * (canvas.height * 0.4) + canvas.height * 0.1, ['#f59e0b', '#ef4444', '#3b82f6', '#10b981', '#ec4899', '#8b5cf6'][i]);
                }, i * 250);
            }

            loop();
        }

        document.getElementById('goalAmountBtn').addEventListener('click', triggerGrandFireworks);
    </script>
</body>
</html>
</artifact>
